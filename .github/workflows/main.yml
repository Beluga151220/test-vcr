name: Build and Push to VCR
on:
  push:
    branches: [ main ]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Login to VCR
        uses: docker/login-action@v2
        with:
          registry: vcr.vngcloud.vn
          username: ${{ secrets.VCR_USERNAME }}
          password: ${{ secrets.VCR_PASSWORD }}
      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: vcr.vngcloud.vn/105496-longnn7-testregistry/my-web:v1
