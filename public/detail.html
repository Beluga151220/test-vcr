<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Detail View - CloudOps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { background: #020617; color: #f1f5f9; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255,255,255,0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen flex flex-col">
    <nav class="p-6 border-b border-white/5 glass sticky top-0">
        <div class="max-w-4xl mx-auto flex justify-between">
            <a href="/" class="flex items-center gap-2 text-blue-400 font-bold hover:text-white transition">
                <i data-lucide="chevron-left" class="w-5 h-5"></i> Quay lại Dashboard
            </a>
        </div>
    </nav>

    <main id="main-content" class="max-w-3xl mx-auto py-20 px-6 flex-grow">
        </main>

    <script>
        lucide.createIcons();
        const id = new URLSearchParams(window.location.search).get('id');
        async function loadContent() {
            const res = await fetch(`/api/docs/${id}`);
            const data = await res.json();
            document.getElementById('main-content').innerHTML = `
                <div class="space-y-8">
                    <img src="${data.img}" class="w-24 h-24 object-contain mx-auto p-4 glass rounded-2xl mb-12">
                    <h1 class="text-5xl font-black text-center tracking-tight">${data.title}</h1>
                    <div class="text-center italic text-slate-500 border-y border-white/5 py-4">${data.desc}</div>
                    <div class="glass p-10 rounded-[40px] leading-relaxed text-slate-300 text-lg shadow-inner">
                        ${data.content}
                    </div>
                </div>
            `;
        }
        loadContent();
    </script>
</body>
</html>
