<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Chi tiết tài liệu - Longnn7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-white text-gray-800">
    <nav class="p-6 border-b"><a href="/" class="font-bold text-violet-600"><i class="fas fa-chevron-left"></i> Quay lại</a></nav>

    <main class="max-w-4xl mx-auto py-12 px-6">
        <div id="contentArea">
            </div>
    </main>

    <footer class="bg-gray-900 text-gray-400 py-12 mt-20">
        <div class="max-w-6xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-8">
            <div><h4 class="text-white font-bold mb-4">Longnn7 Docs</h4><p class="text-sm">Hệ thống học tập Docker/K8s cá nhân.</p></div>
            <div><h4 class="text-white font-bold mb-4">Danh mục</h4><ul class="text-sm space-y-2"><li>Ảo hóa</li><li>Kubernetes</li><li>VNG Cloud</li></ul></div>
            <div><h4 class="text-white font-bold mb-4">Liên hệ</h4><p class="text-sm">Email: longnn7@vng.vn</p></div>
        </div>
    </footer>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const docId = urlParams.get('id');

        async function loadDetail() {
            const res = await fetch(`/api/docs/${docId}`);
            const data = await res.json();
            
            document.getElementById('contentArea').innerHTML = `
                <img src="${data.img}" class="w-full h-64 object-contain mb-8 rounded-2xl bg-gray-50 shadow-inner">
                <h1 class="text-4xl font-black mb-4">${data.title}</h1>
                <div class="flex items-center space-x-4 mb-8">
                    <span class="px-3 py-1 bg-violet-100 text-violet-600 rounded-full text-xs font-bold">${data.category}</span>
                    <span class="text-gray-400 text-xs">Cập nhật: 2026</span>
                </div>
                <div class="prose prose-indigo max-w-none text-lg leading-relaxed text-gray-600">
                    ${data.content}
                </div>
            `;
        }
        loadDocs();
    </script>
</body>
</html>
