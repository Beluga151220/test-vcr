<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết tài liệu - CloudOps</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #020617; color: #e2e8f0; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .content-area b { color: #60a5fa; }
        .content-area ul { list-style-type: disc; padding-left: 20px; margin-top: 10px; color: #94a3b8; }
    </style>
</head>
<body class="min-h-screen">
    <nav class="p-6 border-b border-white/10 glass sticky top-0 z-50">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <a href="/" class="flex items-center gap-2 font-bold text-blue-400 hover:text-blue-300 transition">
                <i data-lucide="arrow-left" class="w-5 h-5"></i> Quay lại Dashboard
            </a>
            <span id="category-badge" class="text-[10px] font-bold uppercase px-3 py-1 bg-white/10 rounded-full border border-white/10 italic text-slate-400">Loading...</span>
        </div>
    </nav>

    <main class="max-w-3xl mx-auto py-16 px-6">
        <div id="contentArea" class="space-y-8">
            <div class="animate-pulse space-y-4">
                <div class="h-8 bg-white/5 rounded w-3/4"></div>
                <div class="h-64 bg-white/5 rounded w-full"></div>
            </div>
        </div>
    </main>

    <footer class="py-12 border-t border-white/10 text-center text-slate-500 text-xs">
        System Documentation Portal &copy; 2026
    </footer>

    <script>
        lucide.createIcons();
        const urlParams = new URLSearchParams(window.location.search);
        const docId = urlParams.get('id');

        async function loadDetail() {
            if(!docId) {
                document.getElementById('contentArea').innerHTML = "Lỗi: Không tìm thấy ID tài liệu.";
                return;
            }

            try {
                const res = await fetch(`/api/docs/${docId}`);
                if (!res.ok) throw new Error("Document not found");
                const data = await res.json();

                document.getElementById('category-badge').innerText = data.category;
                document.getElementById('contentArea').innerHTML = `
                    <div class="space-y-6">
                        <img src="${data.img}" class="w-20 h-20 object-contain p-2 glass rounded-xl mx-auto lg:mx-0">
                        <h1 class="text-4xl lg:text-5xl font-black text-white tracking-tight">${data.title}</h1>
                        <p class="text-xl text-slate-400 italic border-l-4 border-blue-500 pl-4">${data.desc}</p>
                        <div class="glass p-8 rounded-3xl leading-relaxed text-slate-300 content-area shadow-2xl border-white/5">
                            ${data.content}
                        </div>
                    </div>
                `;
            } catch (err) {
                document.getElementById('contentArea').innerHTML = `<div class="text-red-400">Không thể tải tài liệu. Vui lòng kiểm tra lại server.</div>`;
            }
        }
        
        loadDetail(); // Gọi đúng hàm ở đây
    </script>
</body>
</html>
